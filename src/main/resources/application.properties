spring.application.name=vivaeventos-notifications
server.port=8086
management.server.port=8087
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
management.endpoints.web.exposure.include=*

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/vivaeventos_notifications}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:devdb}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:a1b2c3d4}
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:465}
spring.mail.username=${SPRING_MAIL_USERNAME:alexandriabiblioteca611@gmail.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:pnxqpirozaqbaidm}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

notifications.retry.poll-interval=30000
notifications.retry.initial-delay-seconds=30
notifications.retry.max-delay-seconds=3600

# SendGrid (opcional - solo se activa si se configura api-key)
# notifications.sendgrid.api-key=SG.your_api_key_here
# notifications.sendgrid.from-email=noreply@vivaeventos.com
# notifications.sendgrid.from-name=VivaEventos

management.server.port=8087

# ── Trazabilidad distribuida (Micrometer Tracing + Zipkin) ──────
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${MANAGEMENT_ZIPKIN_TRACING_ENDPOINT:http://localhost:9411/api/v2/spans}
